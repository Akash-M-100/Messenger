<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Service - Sign Up & Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .form-container {
      padding: 40px;
    }

    .toggle-buttons {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      background: #f0f0f0;
      color: #666;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-btn.active {
      background: #667eea;
      color: white;
    }

    .toggle-btn:hover {
      background: #e0e0e0;
    }

    .toggle-btn.active:hover {
      background: #667eea;
    }

    h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message {
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .loading {
      display: none;
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    button[type="submit"].loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-left: 8px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="toggle-buttons">
        <button class="toggle-btn active" onclick="toggleForm('signup')">Sign Up</button>
        <button class="toggle-btn" onclick="toggleForm('login')">Login</button>
      </div>

      <!-- Sign Up Form -->
      <form id="signup-form" class="form active" onsubmit="handleSignup(event)">
        <h2>Create Account</h2>
        <p class="subtitle">Join us today and get started</p>
        
        <div id="signup-message" class="message"></div>

        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" name="name" required>
        </div>

        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" name="email" required>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" required>
        </div>

        <button type="submit" id="signup-submit">Sign Up</button>
      </form>

      <!-- Login Form -->
      <form id="login-form" class="form" onsubmit="handleLogin(event)">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>
        
        <div id="login-message" class="message"></div>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" required>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required>
        </div>

        <button type="submit" id="login-submit">Login</button>
      </form>
    </div>
  </div>

  <script>
    function toggleForm(formType) {
      const signupForm = document.getElementById('signup-form');
      const loginForm = document.getElementById('login-form');
      const toggleButtons = document.querySelectorAll('.toggle-btn');

      if (formType === 'signup') {
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
        toggleButtons[0].classList.add('active');
        toggleButtons[1].classList.remove('active');
      } else {
        signupForm.classList.remove('active');
        loginForm.classList.add('active');
        toggleButtons[0].classList.remove('active');
        toggleButtons[1].classList.add('active');
      }

      // Clear messages
      document.getElementById('signup-message').innerHTML = '';
      document.getElementById('login-message').innerHTML = '';
    }

    function showMessage(formType, message, isError = false) {
      const messageEl = document.getElementById(`${formType}-message`);
      messageEl.textContent = message;
      messageEl.className = `message ${isError ? 'error' : 'success'}`;
    }

    async function handleSignup(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing up...';

      try {
        const response = await fetch('/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Signup failed');
        }

        showMessage(
  'signup',
  'Account created successfully! Please login.',
  false
);

form.reset();

setTimeout(() => {
  toggleForm('login');
}, 1500);

      } catch (error) {
        showMessage('signup', error.message, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

      console.log("LOGIN RESPONSE:", data);

showMessage(
  'login',
  'Login successful! Redirecting...',
  false
);

localStorage.setItem(
  "user",
  JSON.stringify(data.data)
);

setTimeout(() => {
  window.location.href = "/relay/dashboard.html";
}, 1000);
      } catch (error) {
        showMessage('login', error.message, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    }
  </script>
</body>
</html>
