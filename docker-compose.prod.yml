version: "3.8"

# Production Docker Compose for AWS EC2 Deployment
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:16-alpine
    container_name: ums-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?error}
      POSTGRES_DB: ${DB_NAME:-messaging_service}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - ums-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== CACHE ====================
  redis:
    image: redis:7-alpine
    container_name: ums-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?error} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ums-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?error}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== CORE SERVICES ====================
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: ums-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      HOST: 0.0.0.0
      PORT: ${API_GATEWAY_PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_GATEWAY_PORT:-3000}:${API_GATEWAY_PORT:-3000}"
    networks:
      - ums-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:${API_GATEWAY_PORT:-3000}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  admin-api:
    build:
      context: .
      dockerfile: apps/admin-api/Dockerfile
    container_name: ums-admin-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      ADMIN_API_HOST: 0.0.0.0
      ADMIN_API_PORT: ${ADMIN_API_PORT:-3001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_SECRET: ${ADMIN_SECRET}
    ports:
      - "${ADMIN_API_PORT:-3001}:${ADMIN_API_PORT:-3001}"
    networks:
      - ums-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:${ADMIN_API_PORT:-3001}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  webhook-receiver:
    build:
      context: .
      dockerfile: apps/webhook-receiver/Dockerfile
    container_name: ums-webhook-receiver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      HOST: 0.0.0.0
      PORT: ${WEBHOOK_PORT:-3002}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${WEBHOOK_PORT:-3002}:${WEBHOOK_PORT:-3002}"
    networks:
      - ums-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${API_GATEWAY_PORT:-3000}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ==================== WORKERS ====================
  worker-email:
    build:
      context: .
      dockerfile: apps/worker-email/Dockerfile
    container_name: ums-worker-email
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    networks:
      - ums-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      replicas: ${EMAIL_WORKER_REPLICAS:-2}

  worker-sms:
    build:
      context: .
      dockerfile: apps/worker-sms/Dockerfile
    container_name: ums-worker-sms
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    networks:
      - ums-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      replicas: ${SMS_WORKER_REPLICAS:-2}

  worker-voice:
    build:
      context: .
      dockerfile: apps/worker-voice/Dockerfile
    container_name: ums-worker-voice
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    networks:
      - ums-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      replicas: ${VOICE_WORKER_REPLICAS:-1}

  worker-whatsapp:
    build:
      context: .
      dockerfile: apps/worker-whatsapp/Dockerfile
    container_name: ums-worker-whatsapp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?error}@postgres:5432/${DB_NAME:-messaging_service}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
    networks:
      - ums-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      replicas: ${WHATSAPP_WORKER_REPLICAS:-2}

networks:
  ums-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
